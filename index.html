<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>벌교고 학생회</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- ===================== 헤더 ===================== -->
    <header class="app-header">
      <!-- 로고 영역 (추후 이미지 추가 예정) -->
      <div class="logo-area" aria-label="벌교고 학생회 로고"></div>
      <h1 class="app-title">벌교고 학생회</h1>
      <p class="app-desc">학교생활에 필요한 정보를 빠르게 확인하세요.</p>
    </header>

    <!-- ===================== 메인 ===================== -->
    <main class="app-main">

      <!-- 메뉴 카드 목록 -->
      <section class="menu-list" aria-label="주요 메뉴">

        <!-- ① 오늘의 급식 -->
        <a
          class="menu-card"
          href="https://beolgyo.jge.hs.kr/beolgyo_hs/ad/fm/foodmenu/selectFoodMenuView.do?mi=44179"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="오늘의 급식 확인하기"
        >
          <div class="menu-icon">🍽</div>
          <div class="menu-text">
            <h2 class="menu-title">오늘의 급식</h2>
            <p class="menu-desc">오늘의 급식을 확인합니다.</p>
          </div>
          <div class="menu-arrow">›</div>
        </a>

        <!-- ② 학사일정 (준비 중, 클릭 비활성화) -->
        <div class="menu-card disabled" aria-label="학사일정, 준비 중">
          <div class="menu-icon">📅</div>
          <div class="menu-text">
            <h2 class="menu-title">학사일정</h2>
            <p class="menu-desc">학교 학사일정을 확인합니다.</p>
          </div>
          <div class="menu-badge">준비 중</div>
        </div>

        <!-- ③ 학교 공지 -->
        <a
          class="menu-card"
          href="https://beolgyo.jge.hs.kr/beolgyo_hs/na/ntt/selectNttList.do?mi=44225&bbsId=44225"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="학교 공지사항 확인하기"
        >
          <div class="menu-icon">📢</div>
          <div class="menu-text">
            <h2 class="menu-title">학교 공지</h2>
            <p class="menu-desc">학교 공지사항을 확인합니다.</p>
          </div>
          <div class="menu-arrow">›</div>
        </a>

      </section>

      <!-- 학생회 공지 (JSON 자동 생성) -->
      <section class="notice-section" aria-label="학생회 공지">
        <h2 class="section-title">🏫 학생회 공지</h2>
        <ul id="notice-list" class="notice-list">
          <!-- JS가 여기에 공지 항목을 자동으로 채워 넣습니다 -->
        </ul>
      </section>

    </main>

    <!-- ===================== 푸터 ===================== -->
    <footer class="app-footer">
      <p>벌교고등학교 학생회</p>
    </footer>

  </div>

  <script src="./js/app.js"></script>
</body>
</html>
